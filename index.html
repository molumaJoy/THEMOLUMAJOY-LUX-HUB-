<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Themolumajoy Lux Hub</title>
<style>
body{margin:0;font-family:Arial;background:#fff;color:#0a1f44}
header{background:#0a1f44;color:#fff;padding:15px;display:flex;justify-content:space-between}
.hero{text-align:center;padding:50px;background:#f4f8ff}
.btn{background:#0a1f44;color:#fff;padding:10px 20px;border:none;border-radius:8px;cursor:pointer}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;padding:20px}
.card{border:1px solid #ddd;padding:10px;border-radius:10px;text-align:center}
img{width:100%;border-radius:8px}
.admin{display:none;padding:20px;background:#eee}
input,textarea{width:100%;margin:5px 0;padding:8px}
</style>
</head>
<body><header>
<h2>THEMOLUMAJOY LUX 💎</h2>
<button class="btn" onclick="login()">Admin Login</button>
</header><section class="hero">
<h1>Luxury That Speaks Before You Do</h1>
<p>24hrs Engraving Jewelry • Non-Tarnish Necklaces • Moissanite • Watches • Tote Bags</p>
</section><section class="grid" id="products"></section><!-- ADMIN PANEL --><div class="admin" id="adminPanel">
<h3>Upload Product</h3>
<input type="text" id="name" placeholder="Product Name">
<input type="text" id="price" placeholder="Price">
<input type="file" id="image">
<button class="btn" onclick="addProduct()">Upload</button>
</div><script>
// PASSWORD (CHANGE THIS)
const PASSWORD = "1234";

function login(){
let pass = prompt("Enter Admin Password");
if(pass === PASSWORD){
document.getElementById("adminPanel").style.display = "block";
}else{
alert("Wrong password");
}
}

// LOAD PRODUCTS
let products = JSON.parse(localStorage.getItem("products")) || [];

function displayProducts(){
let container = document.getElementById("products");
container.innerHTML = "";
products.forEach(p => {
container.innerHTML += `
<div class="card">
<img src="${p.image}">
<h4>${p.name}</h4>
<p>${p.price}</p>
</div>`;
});
}

// ADD PRODUCT
function addProduct(){
let name = document.getElementById("name").value;
let price = document.getElementById("price").value;
let file = document.getElementById("image").files[0];

let reader = new FileReader();
reader.onload = function(){
let product = {name:name, price:price, image:reader.result};
products.push(product);
localStorage.setItem("products", JSON.stringify(products));
displayProducts();
alert("Product Uploaded");
}

if(file){reader.readAsDataURL(file);}else{alert("Select image")}
}

displayProducts();
</script></body>
</html>
