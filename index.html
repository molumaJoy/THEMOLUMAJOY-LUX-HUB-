<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>THEMOLUMAJOY LUX — Shine Daily. Stay Elegant.</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet"/>

<style>
:root{
  --royal:#4A90E2;
  --royal-deep:#2C5DAA;
  --royal-mid:#6EA8FF;

  --gold:#D4AF37;
  --gold-light:#F1E3B0;

  --white:#ffffff;
  --soft:#f4f8ff;
  --text:#0A1F44;
  --muted:#6B7DAA;

  --border:rgba(212,175,55,0.25);
}

*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#ffffff;
  color:var(--text);
  font-family:Montserrat;
}

/* NAV */
nav{
  position:fixed;
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
  background:rgba(255,255,255,0.95);
  border-bottom:1px solid var(--border);
}

.logo{
  font-family:'Cormorant Garamond';
  font-size:22px;
  color:var(--royal);
}

nav a{
  margin:0 10px;
  text-decoration:none;
  font-size:12px;
  color:var(--text);
}

.btn{
  background:var(--royal);
  color:white;
  padding:10px 18px;
  border:none;
  border-radius:20px;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  background:linear-gradient(#ffffff,#f4f8ff);
}

.hero h1{
  font-family:'Cormorant Garamond';
  font-size:60px;
}

.hero h1 span{
  color:var(--gold);
}

.hero p{
  margin:15px 0;
  color:var(--muted);
}

.hero button{
  margin-top:10px;
}

/* PRODUCTS */
.section{
  padding:80px 20px;
  text-align:center;
}

.section h2{
  font-family:'Cormorant Garamond';
  font-size:32px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  margin-top:40px;
}

.card{
  background:#fff;
  border-radius:15px;
  box-shadow:0 10px 20px rgba(0,0,0,0.05);
  overflow:hidden;
}

.card img{
  width:100%;
  height:220px;
  object-fit:cover;
}

.card-content{
  padding:15px;
}

.price{
  color:var(--royal);
  font-weight:bold;
}

/* ADMIN */
.admin-btn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:var(--royal);
  color:#fff;
  border:none;
  border-radius:50%;
  width:50px;
  height:50px;
}

.panel{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#fff;
  padding:20px;
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
}
</style>
</head>

<body>

<nav>
<div class="logo">THEMOLUMAJOY LUX 💎</div>
<div>
<a href="#">Home</a>
<a href="#">Shop</a>
<a href="#">Contact</a>
</div>
</nav>

<section class="hero">
<h1>Shine Daily.<br><span>Stay Elegant.</span></h1>
<p>Moissanite • Engraving • Watches • Tote Bags</p>
<button class="btn" onclick="window.location='https://wa.me/2349157562801'">Shop Now</button>
</section>

<section class="section">
<h2>Our Collection</h2>
<div class="grid" id="products"></div>
</section>

<!-- ADMIN -->
<button class="admin-btn" onclick="login()">⚙️</button>

<div class="panel" id="panel">
<h2>Upload Product</h2>
<input type="text" id="name" placeholder="Product Name">
<input type="text" id="price" placeholder="Price">
<input type="file" id="image">
<button class="btn" onclick="addProduct()">Upload</button>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

<script>
const PASSWORD="lux123";

function login(){
let pass=prompt("Enter password");
if(pass===PASSWORD){
document.getElementById("panel").style.display="block";
}else{alert("Wrong password")}
}

// PASTE YOUR FIREBASE LINK HERE
const firebaseConfig={
databaseURL:"https://YOUR-DATABASE.firebaseio.com/"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

function addProduct(){
let name=document.getElementById("name").value;
let price=document.getElementById("price").value;
let file=document.getElementById("image").files[0];

let reader=new FileReader();
reader.onload=function(){
let product={name,price,image:reader.result};
db.ref("products").push(product);
alert("Uploaded");
}
reader.readAsDataURL(file);
}

function loadProducts(){
db.ref("products").on("value",snapshot=>{
let container=document.getElementById("products");
container.innerHTML="";
snapshot.forEach(child=>{
let p=child.val();
container.innerHTML+=`
<div class="card">
<img src="${p.image}">
<div class="card-content">
<h4>${p.name}</h4>
<p class="price">${p.price}</p>
</div>
</div>
`;
});
});
}

loadProducts();
</script>

</body>
</html>
