<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Themolumajoy Lux Hub</title><!-- Google Font for luxury feel --><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet"><style>
body{margin:0;background:#fff;color:#0a1f44;font-family:Montserrat}
header{display:flex;justify-content:space-between;align-items:center;padding:20px 30px;background:#fff;border-bottom:1px solid #eee}
.logo{font-family:'Playfair Display';font-size:22px;font-weight:700}
nav a{margin:0 10px;text-decoration:none;color:#0a1f44;font-size:14px}
.hero{height:80vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;background:linear-gradient(to bottom,rgba(10,31,68,0.5),rgba(10,31,68,0.9)),url('https://images.unsplash.com/photo-1519741497674-611481863552');background-size:cover;color:#fff}
.hero h1{font-size:40px;font-family:'Playfair Display'}
.hero p{font-size:16px;margin:10px 0 20px}
.btn{background:#fff;color:#0a1f44;padding:12px 25px;border:none;border-radius:30px;cursor:pointer;font-weight:600}
.section{padding:60px 30px;text-align:center}
.section h2{font-family:'Playfair Display';font-size:28px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-top:30px}
.card{border-radius:15px;overflow:hidden;box-shadow:0 10px 25px rgba(0,0,0,0.08);transition:0.3s}
.card:hover{transform:translateY(-5px)}
.card img{width:100%;height:220px;object-fit:cover}
.card-content{padding:15px}
.price{color:#0a1f44;font-weight:bold}
footer{background:#0a1f44;color:#fff;text-align:center;padding:30px;margin-top:50px}
.admin{position:fixed;bottom:20px;right:20px}
.admin button{background:#0a1f44;color:#fff;padding:10px;border:none;border-radius:50%}
.panel{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#fff;padding:20px;overflow:auto}
input{width:100%;padding:10px;margin:10px 0;border:1px solid #ccc;border-radius:8px}
</style></head><body><header>
<div class="logo">THEMOLUMAJOY LUX 💎</div>
<nav>
<a href="#">Home</a>
<a href="#">Shop</a>
<a href="#">Contact</a>
</nav>
</header><section class="hero">
<h1>Luxury That Speaks Before You Do</h1>
<p>Moissanite • Engraving • Watches • Tote Bags</p>
<button class="btn" onclick="window.location='https://wa.me/2349157562801'">Shop Now</button>
</section><section class="section">
<h2>Our Collection</h2>
<div class="grid" id="products"></div>
</section><footer>
<p>Themolumajoy Lux Hub</p>
<p>WhatsApp: 09157562801 | Edo State, Nigeria</p>
</footer><!-- ADMIN FLOAT BUTTON --><div class="admin">
<button onclick="login()">⚙️</button>
</div><!-- ADMIN PANEL --><div class="panel" id="panel">
<h2>Admin Upload</h2>
<input type="text" id="name" placeholder="Product Name">
<input type="text" id="price" placeholder="Price">
<input type="file" id="image">
<button class="btn" onclick="addProduct()">Upload Product</button>
</div><!-- FIREBASE --><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script><script>
// 🔐 CHANGE THIS PASSWORD
const PASSWORD = "lux123";

function login(){
let pass = prompt("Enter Admin Password");
if(pass === PASSWORD){
document.getElementById('panel').style.display='block';
}else{alert('Wrong password');}
}

// 🔥 FIREBASE CONFIG (I will help you set this)
const firebaseConfig = {
  databaseURL: "https://YOUR-DATABASE.firebaseio.com/"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function addProduct(){
let name = document.getElementById('name').value;
let price = document.getElementById('price').value;
let file = document.getElementById('image').files[0];

let reader = new FileReader();
reader.onload = function(){
let product = {name, price, image:reader.result};
db.ref('products').push(product);
alert('Uploaded');
}
reader.readAsDataURL(file);
}

function loadProducts(){
db.ref('products').on('value', snapshot=>{
let container = document.getElementById('products');
container.innerHTML='';
snapshot.forEach(child=>{
let p = child.val();
container.innerHTML += `
<div class="card">
<img src="${p.image}">
<div class="card-content">
<h4>${p.name}</h4>
<p class="price">${p.price}</p>
</div>
</div>`;
});
});
}

loadProducts();
</script></body>
</html>
